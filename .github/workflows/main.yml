name: CI/CD - Front Despacho

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 230074771520.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: eks-p4
  K8S_NAMESPACE: innovatech

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push imagen (front-despacho)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/rd-front-despacho:latest
            ${{ env.ECR_REGISTRY }}/rd-front-despacho:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ env.AWS_REGION }}

      - name: Actualizar kubeconfig del clúster EKS
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      # No aplica ningún yaml: asume que el Deployment "front-despacho" y
      # los Service "back-ventas"/"back-despachos" ya existen en el clúster
      # (aplicados localmente por ti). Solo actualiza la imagen y refresca
      # las URLs públicas de los backends por si el LoadBalancer cambió.
      - name: Resolver URLs públicas de los backends
        run: |
          resolve_host () {
            kubectl get svc "$1" -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null
          }
          echo "BACK_VENTAS_HOST=$(resolve_host back-ventas)" >> "$GITHUB_ENV"
          echo "BACK_DESPACHOS_HOST=$(resolve_host back-despachos)" >> "$GITHUB_ENV"

      - name: Actualizar imagen y URLs de front-despacho
        run: |
          kubectl set image deployment/rd-front-despacho rd-front-despacho=${{ env.ECR_REGISTRY }}/rd-front-despacho:${{ github.sha }} -n ${{ env.K8S_NAMESPACE }}
          if [ -n "${{ env.BACK_VENTAS_HOST }}" ] && [ -n "${{ env.BACK_DESPACHOS_HOST }}" ]; then
            kubectl set env deployment/rd-front-despacho -n ${{ env.K8S_NAMESPACE }} \
              BACK_VENTAS_URL="http://${{ env.BACK_VENTAS_HOST }}:8080" \
              BACK_DESPACHOS_URL="http://${{ env.BACK_DESPACHOS_HOST }}:8081"
          fi
          kubectl rollout status deployment/rd-front-despacho -n ${{ env.K8S_NAMESPACE }} --timeout=180s
